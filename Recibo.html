<!doctype html>
<html lang="es" data-bs-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Recibo</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    body{
      background:#0b0f14;
      color: rgba(233,238,245,.92);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap{
      max-width: 980px;
    }

    .btn-soft{
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(233,238,245,.92);
    }

    .btn-soft:hover{
      filter: brightness(1.08);
    }

    .muted{
      color: rgba(233,238,245,.70);
    }

    .mini{
      font-size: .92rem;
    }

    .cardx{
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 14px;
    }

    /* =========================
       TICKET
    ========================= */
    #pdfArea{
      width: 80mm;
      min-height: 297mm;
      background: #ffffff !important;
      color: #000000 !important;
      border-radius: 16px;
      padding: 8mm 5mm;
      margin: 0 auto;
      box-sizing: border-box;
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: none;
      -moz-osx-font-smoothing: auto;
      font-weight: 700;
    }

    #pdfArea *{
      color: #000000 !important;
      font-weight: 700 !important;
      opacity: 1 !important;
      text-shadow: none !important;
      filter: none !important;
      box-shadow: none !important;
    }

    .t-center{
      text-align:center;
    }

    .t-hr{
      border: 0;
      border-top: 1px dashed #000000;
      margin: 10px 0;
      opacity: 1;
    }

    .t-row{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }

    .t-muted{
      color:#000000 !important;
      font-size:12px;
      font-weight:800 !important;
    }

    .t-small{
      font-size:12px;
    }

    .t-bold{
      font-weight: 800 !important;
    }

    .t-title{
      font-weight: 900 !important;
      font-size: 17px;
      letter-spacing: .2px;
      color:#000000 !important;
    }

    .logo{
      width: 54px;
      height: 54px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid #000000;
      display:none;
      margin: 0 auto 8px;
      background: #ffffff;
    }

    /* Items */
    .items{
      margin-top: 6px;
      font-size: 12px;
    }

    .item{
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding: 6px 0;
      border-bottom: 1px solid #000000 !important;
    }

    .item:last-child{
      border-bottom: none;
    }

    .item-name{
      flex: 1;
      min-width: 0;
    }

    .item-name .n{
      font-weight: 900 !important;
      line-height: 1.12;
      color:#000000 !important;
      font-size: 14px;
    }

    .item-name .s{
      font-size: 12px;
      color:#000000 !important;
      margin-top: 2px;
      font-weight: 800 !important;
    }

    .item-qty{
      width: 40px;
      text-align:right;
      color:#000000 !important;
      font-weight: 800 !important;
    }

    .item-total{
      width: 84px;
      text-align:right;
      font-weight: 900 !important;
      color:#000000 !important;
      white-space: nowrap;
    }

    /* Totals */
    .totals{
      margin-top: 8px;
      font-size: 12px;
    }

    .totals .t-row{
      margin: 4px 0;
    }

    .grand{
      font-size: 14px;
      font-weight: 900 !important;
      margin-top: 6px;
      color:#000000 !important;
    }

    /* QR */
    .qrbox{
      margin-top: 10px;
      display: grid;
      place-items: center;
      gap: 6px;
    }

    #rxQRCanvas{
      width: 170px;
      height: 170px;
      background:#ffffff !important;
      border-radius: 14px;
      border: 1px solid #000000 !important;
      padding: 8px;
      display:block;
      margin: 0 auto;
    }

    .foot{
      margin-top: 8px;
      text-align:center;
      font-size: 11px;
      color:#000000 !important;
      font-weight: 800 !important;
    }

    .no-print{
      display: inline-flex;
    }

    /* =========================
       IMPRESIÓN
    ========================= */
    @page{
      size: 80mm 297mm;
      margin: 0;
    }

    @media print{
      html, body{
        width: 80mm !important;
        min-width: 80mm !important;
        margin: 0 !important;
        padding: 0 !important;
        background: #ffffff !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }

      body{
        display:flex;
        justify-content:center;
        align-items:flex-start;
      }

      main.container{
        margin: 0 !important;
        padding: 0 !important;
        max-width: none !important;
      }

      .wrap{
        max-width: none !important;
        width: 80mm !important;
        margin: 0 auto !important;
      }

      #pdfArea{
        width: 80mm !important;
        min-height: 297mm !important;
        margin: 0 auto !important;
        padding: 8mm 5mm !important;
        border-radius: 0 !important;
        box-shadow: none !important;
        background: #ffffff !important;
        color: #000000 !important;
        page-break-inside: avoid;
        break-inside: avoid;
      }

      #pdfArea,
      #pdfArea *{
        color: #000000 !important;
        font-weight: 800 !important;
        opacity: 1 !important;
      }

      .cardx,
      #rxErr,
      .no-print{
        display: none !important;
      }
    }
  </style>
</head>

<body>
  <main class="container py-4">
    <div class="wrap mx-auto">

      <div id="rxErr" class="alert alert-danger d-none"></div>

      <!-- Controles -->
      <div class="cardx mb-3 no-print">
        <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center">
          <div class="muted mini">
            <i class="bi bi-shield-check me-1"></i>
            Ticket digital seguro (token)
          </div>
          <div class="d-flex gap-2 flex-wrap">
            <button id="btnPrint" class="btn btn-success">
              <i class="bi bi-printer me-1"></i> Imprimir
            </button>
            <button id="btnPdf" class="btn btn-primary">
              <i class="bi bi-filetype-pdf me-1"></i> Descargar PDF
            </button>
            <button id="btnCopy" class="btn btn-soft">
              <i class="bi bi-clipboard me-1"></i> Copiar link
            </button>
          </div>
        </div>
      </div>

      <!-- Ticket area -->
      <section id="pdfArea" aria-label="Ticket">
        <img id="rxLogo" class="logo" alt="Logo del negocio" />

        <div class="t-center">
          <div class="t-title" id="rxBizName">—</div>
          <div class="t-muted" id="rxBizMeta">—</div>
        </div>

        <div class="t-hr"></div>

        <div class="t-small">
          <div class="t-row"><span class="t-muted">Fecha</span><span id="rxDate">—</span></div>
          <div class="t-row"><span class="t-muted">Folio</span><span class="t-bold" id="rxFolio">—</span></div>
          <div class="t-row"><span class="t-muted">Pago</span><span id="rxPayMethod">—</span></div>
          <div class="t-row"><span class="t-muted">Ref</span><span id="rxPayRef">—</span></div>
        </div>

        <div class="t-hr"></div>

        <div class="t-row t-small" style="margin-bottom:6px;">
          <span class="t-bold">Items</span>
          <span class="t-muted" id="rxItemsCount">0</span>
        </div>

        <div id="rxItems" class="items"></div>

        <div class="t-hr"></div>

        <div class="totals">
          <div class="t-row"><span class="t-muted">Subtotal</span><span id="rxSubtotal">$0.00</span></div>
          <div class="t-row"><span class="t-muted">Descuento</span><span id="rxDiscount">$0.00</span></div>
          <div class="t-row"><span class="t-muted">Impuestos</span><span id="rxTax">$0.00</span></div>
          <div class="t-row grand"><span>Total</span><span id="rxTotal">$0.00</span></div>
        </div>

        <div class="t-hr"></div>

        <div class="t-small">
          <div class="t-muted">Nota</div>
          <div id="rxNote" style="white-space: pre-wrap;">—</div>
        </div>

        <div class="qrbox">
          <canvas id="rxQRCanvas" width="170" height="170"></canvas>
          <div class="t-muted t-center" style="font-size:11px;">
            Escanea para ver/guardar este recibo
          </div>
        </div>

        <div class="foot" id="rxThanks">
          Gracias por tu compra 💙
        </div>
      </section>

    </div>
  </main>

  <!-- libs -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <!-- tu JS -->
  <script type="module" src="JavaScript/recibo.js"></script>
</body>
</html>
